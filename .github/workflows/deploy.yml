name: Build and Deploy Eden Request API

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - master
    types:
      - closed

# Add these explicit permissions so the pipeline can write to GitHub Packages (GHCR)
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # This block ensures that for master, the pipeline ONLY runs if the PR was actually merged (not just closed without merging)
    if: |
      github.event_name == 'push' || 
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Downcase Repository Name
      run: |
        echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    # Set dynamic tag based on event type (handles dev push vs master pull request merge)
    - name: Determine Docker Tag
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          echo "DOCKER_TAG=${{ github.base_ref }}" >> $GITHUB_ENV
        else
          echo "DOCKER_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
        fi

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./EdenRequest.Api/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ env.IMAGE_NAME }}:${{ env.DOCKER_TAG }}
          ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}